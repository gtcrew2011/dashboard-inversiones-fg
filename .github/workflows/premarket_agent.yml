name: Yoel E1/E2 Premarket Agent

on:
  schedule:
    # Minutos desplazados (:07, :37) en vez de horas redondas para evitar la cola
    # de alta carga de GitHub Actions, que retrasa los crons de :00 hasta 15-60 min.
    # ZoneInfo("America/New_York") en el script maneja DST automaticamente.
    - cron: "7 13 * * 1-5"    # 09:07 ET (EDT=UTC-4)
    - cron: "7 15 * * 1-5"    # 11:07 ET
    - cron: "37 17 * * 1-5"   # 13:37 ET
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forzar ejecución ignorando la ventana horaria (1 = sí)"
        required: false
        default: "0"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr agente
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_RUN: ${{ github.event_name == 'schedule' && '1' || github.event.inputs.force_run || '0' }}
        run: python premarket_agent.py