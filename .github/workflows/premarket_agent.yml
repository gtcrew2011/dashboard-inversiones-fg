name: Yoel E1/E2 Premarket Agent

on:
  schedule:
    # ZoneInfo("America/New_York") en el script maneja DST automaticamente --
    # no se necesitan crons duplicados para EST/EDT. Un solo set en UTC es suficiente.
    - cron: "0 13 * * 1-5"    # 09:00 ET (EDT=UTC-4)
    - cron: "0 15 * * 1-5"    # 11:00 ET
    - cron: "30 17 * * 1-5"   # 13:30 ET
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forzar ejecución ignorando la ventana horaria (1 = sí)"
        required: false
        default: "0"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr agente
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Para runs programados: FORCE_RUN=1 siempre -- el cron ya es la guardia de tiempo.
          # Para runs manuales: respeta el input (default 0, lo que activa _is_target_window).
          FORCE_RUN: ${{ github.event_name == 'schedule' && '1' || github.event.inputs.force_run || '0' }}
        run: python premarket_agent.py
